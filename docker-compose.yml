services:
  backend:
    build:
      context: ../python-backend
    env_file:
      - ../python-backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ../python-backend/data:/app/data

  frontend:
    build:
      context: ./ai-code-helper-frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
